name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Install package dependencies
        id: install
        continue-on-error: true
        run: flutter pub get
      - name: Capture Flutter toolchain
        if: always()
        run: |
          mkdir -p build/evidence
          flutter --version --machine > build/evidence/flutter-version.json
      - name: Verify generated evidence contract
        id: meta
        continue-on-error: true
        run: >-
          dart run tool/generate_evidence_contract.dart
          --check
          --evidence build/evidence/metaprogramming.json
      - name: Check formatting
        id: format
        continue-on-error: true
        run: dart format --output=none --set-exit-if-changed lib test tool example/lib example/test
      - name: Analyze package
        id: analyze
        continue-on-error: true
        run: flutter analyze
      - name: Test package
        id: package_tests
        continue-on-error: true
        run: flutter test
      - name: Test example
        id: example_tests
        continue-on-error: true
        working-directory: example
        run: flutter test
      - name: Validate package publication
        id: publication
        continue-on-error: true
        run: flutter pub publish --dry-run
      - name: Build web showcase
        id: web_build
        continue-on-error: true
        working-directory: example
        run: flutter build web --release
      - name: Write CI evidence attestation
        if: always()
        env:
          CHECK_INSTALL: ${{ steps.install.outcome }}
          CHECK_META: ${{ steps.meta.outcome }}
          CHECK_FORMAT: ${{ steps.format.outcome }}
          CHECK_ANALYZE: ${{ steps.analyze.outcome }}
          CHECK_PACKAGE_TESTS: ${{ steps.package_tests.outcome }}
          CHECK_EXAMPLE_TESTS: ${{ steps.example_tests.outcome }}
          CHECK_PUBLICATION: ${{ steps.publication.outcome }}
          CHECK_WEB_BUILD: ${{ steps.web_build.outcome }}
        run: >-
          dart run tool/attest_ci.dart
          --flutter-machine build/evidence/flutter-version.json
          --output build/evidence/ci-attestation.json
      - name: Upload CI evidence
        if: always()
        id: evidence_upload
        uses: actions/upload-artifact@v7
        with:
          name: astryx-ci-evidence-${{ github.sha }}
          path: build/evidence/*.json
          if-no-files-found: error
          retention-days: 30
      - name: Record artifact digest
        if: always()
        run: |
          echo "### Astryx CI evidence" >> "$GITHUB_STEP_SUMMARY"
          echo "- Decision file: build/evidence/ci-attestation.json" >> "$GITHUB_STEP_SUMMARY"
          echo "- Artifact digest: ${{ steps.evidence_upload.outputs.artifact-digest }}" >> "$GITHUB_STEP_SUMMARY"
      - name: Enforce evidence gate
        if: always()
        run: dart run tool/check_attestation.dart build/evidence/ci-attestation.json

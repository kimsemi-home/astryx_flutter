name: astryx_flutter
description: Astryx-inspired atomic Flutter UI and pluggable REST, GraphQL, SSE, and HATEOAS transports.
version: 0.2.0
homepage: https://github.com/kimsemi-home/astryx_flutter
repository: https://github.com/kimsemi-home/astryx_flutter
issue_tracker: https://github.com/kimsemi-home/astryx_flutter/issues
topics:
  - design-system
  - atomic-design
  - graphql
  - sse
  - hateoas

environment:
  sdk: ">=3.6.0 <4.0.0"
  flutter: ">=3.32.0"

dependencies:
  flutter:
    sdk: flutter
  http: ^1.6.0
  meta: ^1.16.0

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
